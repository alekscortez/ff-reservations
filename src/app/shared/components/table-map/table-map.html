<section class="table-map-shell">
  <div
    class="table-map-canvas"
    (click)="onSvgClick($event)"
    (keydown)="onSvgKeydown($event)"
  >
    <div class="table-map-svg" *ngIf="safeSvgMarkup()" [innerHTML]="safeSvgMarkup()"></div>
    <div class="table-map-empty" *ngIf="!safeSvgMarkup() && !loadError()">
      Loading map...
    </div>
    <div class="table-map-error" *ngIf="loadError()">
      {{ loadError() }}
    </div>
  </div>
  <p class="sr-only" *ngIf="interactive">
    Use the arrow keys to move between available tables. Press Enter or Space to select.
    Press Home or End to jump to the first or last available table.
  </p>
</section>
