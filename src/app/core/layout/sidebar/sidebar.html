<hlm-sidebar>
  <hlm-sidebar-header>
    <a
      routerLink="/staff/dashboard"
      (click)="onNavigate()"
      class="flex items-center gap-2 rounded-md px-2 py-1.5 text-sidebar-foreground hover:bg-sidebar-accent"
    >
      <span class="flex aspect-square size-8 items-center justify-center rounded-lg bg-sidebar-primary p-1.5">
        <img
          src="/assets/FF_monogram.svg"
          alt=""
          aria-hidden="true"
          class="h-full w-full invert"
        />
      </span>
      <span class="grid flex-1 text-left text-sm leading-tight">
        <span class="truncate font-semibold">Famoso Fuego</span>
        <span class="truncate text-xs text-sidebar-foreground/60">Reservations</span>
      </span>
    </a>
  </hlm-sidebar-header>

  <hlm-sidebar-content>
    <ng-container *ngIf="(isStaff$ | async) || (isAdmin$ | async)">
      <hlm-sidebar-group>
        <hlm-sidebar-group-label>Staff</hlm-sidebar-group-label>
        <ul hlmSidebarMenu>
          <li hlmSidebarMenuItem>
            <a
              hlmSidebarMenuButton
              routerLink="/staff/dashboard"
              routerLinkActive
              #dashRla="routerLinkActive"
              [active]="dashRla.isActive"
              (click)="onNavigate()"
            >
              <ng-icon name="lucideLayoutDashboard"></ng-icon>
              <span>Dashboard</span>
            </a>
          </li>
          <li hlmSidebarMenuItem>
            <a
              hlmSidebarMenuButton
              routerLink="/staff/reservations"
              routerLinkActive
              #resRla="routerLinkActive"
              [active]="resRla.isActive"
              (click)="onNavigate()"
            >
              <ng-icon name="lucideCalendarDays"></ng-icon>
              <span>Reservations</span>
            </a>
          </li>
          <li hlmSidebarMenuItem>
            <a
              hlmSidebarMenuButton
              routerLink="/staff/check-in"
              routerLinkActive
              #ciRla="routerLinkActive"
              [active]="ciRla.isActive"
              (click)="onNavigate()"
            >
              <ng-icon name="lucideTicket"></ng-icon>
              <span>Check In</span>
            </a>
          </li>
        </ul>
      </hlm-sidebar-group>
    </ng-container>

    <ng-container *ngIf="isAdmin$ | async">
      <hlm-sidebar-group>
        <hlm-sidebar-group-label>Admin</hlm-sidebar-group-label>
        <ul hlmSidebarMenu>
          <li hlmSidebarMenuItem>
            <a
              hlmSidebarMenuButton
              routerLink="/admin/events"
              routerLinkActive
              #evRla="routerLinkActive"
              [active]="evRla.isActive"
              (click)="onNavigate()"
            >
              <ng-icon name="lucidePartyPopper"></ng-icon>
              <span>Events</span>
            </a>
          </li>
          <li hlmSidebarMenuItem>
            <a
              hlmSidebarMenuButton
              routerLink="/admin/frequent-clients"
              routerLinkActive
              #fcRla="routerLinkActive"
              [active]="fcRla.isActive"
              (click)="onNavigate()"
            >
              <ng-icon name="lucideStar"></ng-icon>
              <span>Frequent Clients</span>
            </a>
          </li>
          <li hlmSidebarMenuItem>
            <a
              hlmSidebarMenuButton
              routerLink="/admin/clients"
              routerLinkActive
              #clRla="routerLinkActive"
              [active]="clRla.isActive"
              (click)="onNavigate()"
            >
              <ng-icon name="lucideUsers"></ng-icon>
              <span>Clients</span>
            </a>
          </li>
          <li hlmSidebarMenuItem>
            <a
              hlmSidebarMenuButton
              routerLink="/admin/financials"
              routerLinkActive
              #fiRla="routerLinkActive"
              [active]="fiRla.isActive"
              (click)="onNavigate()"
            >
              <ng-icon name="lucideReceipt"></ng-icon>
              <span>Financials</span>
            </a>
          </li>
        </ul>
      </hlm-sidebar-group>

      <hlm-sidebar-group class="mt-auto">
        <ul hlmSidebarMenu>
          <li hlmSidebarMenuItem>
            <a
              hlmSidebarMenuButton
              routerLink="/admin/users"
              routerLinkActive
              #usRla="routerLinkActive"
              [active]="usRla.isActive"
              (click)="onNavigate()"
            >
              <ng-icon name="lucideShieldCheck"></ng-icon>
              <span>Users</span>
            </a>
          </li>
          <li hlmSidebarMenuItem>
            <a
              hlmSidebarMenuButton
              routerLink="/admin/settings"
              routerLinkActive
              #stRla="routerLinkActive"
              [active]="stRla.isActive"
              (click)="onNavigate()"
            >
              <ng-icon name="lucideSettings"></ng-icon>
              <span>Settings</span>
            </a>
          </li>
        </ul>
      </hlm-sidebar-group>
    </ng-container>
  </hlm-sidebar-content>

  <hlm-sidebar-footer *ngIf="isAuthenticated$ | async">
    <ul hlmSidebarMenu>
      <li hlmSidebarMenuItem>
        <button
          hlmSidebarMenuButton
          size="lg"
          type="button"
          [hlmMenuTriggerFor]="userMenu"
          [hlmMenuPosition]="menuPosition()"
          aria-label="Open account menu"
        >
          <hlm-avatar class="rounded-lg bg-sidebar-primary text-sidebar-primary-foreground">
            <ng-container *ngIf="photoUrl$ | async as photoUrl">
              <img hlmAvatarImage [src]="photoUrl" [alt]="(name$ | async) || 'User avatar'" />
            </ng-container>
            <span hlmAvatarFallback>{{ initials$ | async }}</span>
          </hlm-avatar>
          <div class="grid flex-1 text-left text-sm leading-tight">
            <span class="truncate font-medium">{{ (name$ | async) || 'User' }}</span>
            <span class="truncate text-xs text-sidebar-foreground/60">{{ subtitle$ | async }}</span>
          </div>
          <ng-icon name="lucideChevronsUpDown" class="ml-auto size-4 shrink-0 text-sidebar-foreground/60"></ng-icon>
        </button>
      </li>
    </ul>
  </hlm-sidebar-footer>
</hlm-sidebar>

<ng-template #userMenu>
  <div hlmMenu class="min-w-56 rounded-lg">
    <div class="flex items-center gap-2 px-2 py-1.5 text-left text-sm">
      <hlm-avatar class="rounded-lg bg-sidebar-primary text-sidebar-primary-foreground">
        <ng-container *ngIf="photoUrl$ | async as photoUrl">
          <img hlmAvatarImage [src]="photoUrl" [alt]="(name$ | async) || 'User avatar'" />
        </ng-container>
        <span hlmAvatarFallback>{{ initials$ | async }}</span>
      </hlm-avatar>
      <div class="grid flex-1 leading-tight">
        <span class="truncate font-medium">{{ (name$ | async) || 'User' }}</span>
        <span class="truncate text-xs text-brand-500">{{ subtitle$ | async }}</span>
      </div>
    </div>
    <hlm-menu-separator />
    <button hlmMenuItem (click)="logout()">
      <ng-icon name="lucideLogOut" class="size-4"></ng-icon>
      Log out
    </button>
  </div>
</ng-template>
