<header
  class="fixed inset-x-0 top-0 z-50 flex h-14 items-center gap-2 border-b border-border bg-background px-3 md:h-14 md:px-4"
>
  <button
    hlmBtn variant="ghost" size="icon-sm"
    hlmSidebarTrigger
    type="button"
    *ngIf="isAuthenticated$ | async"
    aria-label="Toggle sidebar"
  >
    <ng-icon name="lucidePanelLeft" class="size-4"></ng-icon>
  </button>

  <span
    *ngIf="isAuthenticated$ | async"
    class="hidden h-6 w-px bg-border sm:block"
    aria-hidden="true"
  ></span>

  <a
    *ngIf="!(isAuthenticated$ | async)"
    class="inline-flex items-center gap-2 font-semibold text-foreground"
    routerLink="/home"
  >
    <img class="h-7 w-7 object-contain" src="/assets/ff-logo.svg" alt="Famoso Fuego" />
    <span class="hidden text-sm tracking-wide sm:inline">Famoso Fuego Reservations</span>
  </a>

  <div
    class="hidden min-w-0 items-center gap-1 rounded-full border border-border bg-muted/50 px-2 py-1 sm:inline-flex"
    *ngIf="isAuthenticated$ | async"
  >
    <span class="max-w-[170px] truncate text-[11px] font-semibold text-foreground">{{ contextLabel() }}</span>
    <span class="text-[10px] uppercase tracking-[0.08em] text-muted-foreground">{{ contextDateLabel() }}</span>
  </div>

  <div class="ml-auto flex items-center gap-2">
    <ng-container *ngIf="isAuthenticated$ | async; else loggedOut">
      <button
        hlmBtn variant="outline" size="sm"
        *ngIf="isStaffOrAdmin"
        type="button"
        class="relative"
        (click)="toggleQuickActions()"
        aria-label="Quick actions"
      >
        Quick
        <span
          *ngIf="urgentPaymentCount > 0"
          class="absolute -right-1 -top-1 inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-danger-700 px-1 text-[10px] font-semibold text-white"
        >
          {{ urgentPaymentCount }}
        </span>
      </button>

      <a
        hlmBtn size="sm"
        *ngIf="isStaffOrAdmin && !isOnNewReservationRoute()"
        routerLink="/staff/reservations/new"
        [queryParams]="newReservationQueryParams()"
      >
        <span class="md:hidden">+ New</span>
        <span class="hidden md:inline">+ New Reservation</span>
      </a>
    </ng-container>

    <ng-template #loggedOut>
      <button hlmBtn size="sm" type="button" (click)="login()">
        Log in
      </button>
    </ng-template>
  </div>
</header>

<hlm-dialog *ngIf="isQuickActionsOpen" (close)="closeQuickActions()" size="sheet" [ariaLabel]="'Quick Actions'">
  <div class="flex items-center justify-between gap-3">
    <h3 class="text-sm font-semibold text-foreground">Quick Actions</h3>
    <button
      hlmBtn variant="outline" size="icon-sm"
      type="button"
      class="rounded-full"
      (click)="closeQuickActions()"
      aria-label="Close quick actions"
    >
      <ng-icon name="lucideX" size="14" />
    </button>
  </div>

  <div class="mt-3 rounded-lg border border-border bg-muted/50 px-3 py-2 text-xs text-muted-foreground">
    <p class="font-semibold text-foreground">{{ contextLabel() }}</p>
    <p>{{ contextDateLabel() }}</p>
  </div>

  <div class="mt-3 grid gap-2">
    <button hlmBtn size="lg" type="button" (click)="sharePublicAvailability()">
      Share Availability Link
    </button>

    <a
      *ngIf="urgentPaymentCount > 0"
      hlmBtn variant="outline" size="lg"
      [routerLink]="['/staff/dashboard']"
      class="justify-between"
      (click)="closeQuickActions()"
    >
      <span>Urgent Payments</span>
      <span class="inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-danger-700 px-1 text-[10px] font-semibold text-white">
        {{ urgentPaymentCount }}
      </span>
    </a>
  </div>

  <p class="mt-2 text-xs text-success-700" *ngIf="quickAvailabilityNotice">{{ quickAvailabilityNotice }}</p>
  <p class="mt-2 text-xs text-danger-700" *ngIf="quickAvailabilityError">{{ quickAvailabilityError }}</p>
</hlm-dialog>
