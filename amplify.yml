version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22 && nvm use 22
        # The lock file is generated by npm 11.6.2 (declared in package.json's
        # `packageManager` field). Node 22 ships with npm 10.9.7, whose `npm
        # ci` validation rejects the npm-11-written lock file with
        # "Missing chokidar@4.0.3 from lock file" even though the entry is
        # present. Corepack's `prepare --activate` doesn't actually replace
        # the bundled npm shim — it works for yarn/pnpm but is a no-op for
        # npm. Install npm 11.6.2 globally instead so it lands in PATH.
        - npm install -g npm@11.6.2
        - node --version
        - npm --version
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/ff-reservations/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
